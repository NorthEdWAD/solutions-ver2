<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive JS Slideshow</title>
    <link rel="stylesheet" href="resp-js-slideshow.css">
  
</head>
<body>

    <div id="gallery-container">
        <h1>Image Gallery</h1>
        
        <img id="gallery-img" src="coffee-shop.jpg" alt="Gallery Image">
        
        <p id="gallery-caption">Coffee Shop</p>
        
        <button id="prev-btn">Previous</button>
        <button id="pause-btn">Pause</button>
        <button id="next-btn">Next</button>
    </div>

    <script src="resp-js-slideshow.js"></script>
</body>
</html>
