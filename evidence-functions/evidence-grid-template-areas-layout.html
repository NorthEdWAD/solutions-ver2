<!DOCTYPE html>
<html lang="en">
<head>
	<title>Basic Grid Layout</title>
	<meta charset = "utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
	body {
		background-color: #eee;
		font-family: Arial, "Helvetica Neue", sans-serif;
		font-size: 1.8em;
		color: #000;
	}
	
	.container {
		display: grid;
		width: 750px;
		height: 600px;
		background-color: lightslategray;
 
		/* Center grid container in browser window */
		margin: 0 auto;
		grid-template-areas: 
			"header header header"
			"sidebar content-1 content-1"
			"sidebar content-2 content-3"
			"footer footer footer";

        gap: 5px;
	}
	
	/* Using the HTML5 semantic tags for header and footer */	
	header {
		grid-area: header;
		background-color: #66cc66; /* for header */
		color: #000;
		padding: 10px;
	}

    footer {
		grid-area: footer;
		background-color: #cc186c; /* for footer */
		color: #000;
		padding: 10px;
	}

	.sidebar {
		grid-area: sidebar;
		background-color: orangered;
		padding: 10px;
	}
	
	.content-1 {
		grid-area: content-1;
		background-color: #85adad;
		padding: 10px;
	}
	
	.content-2 {
		grid-area: content-2;
		background-color: #d580ff;
		padding: 10px;
	}
	
	.content-3 {
		grid-area: content-3;
		background-color: #ff1a1a;
		padding: 10px;
	}
	</style>
</head>
<body>

<div class = "container">
	<header>Header</header>
	<div class = "sidebar">Sidebar</div>
	<div class = "content-1">Content-1</div>
	<div class = "content-2">Content-2</div>
	<div class = "content-3">Content-3</div>
	<footer>Copyright &copy; 20XX by Career Tech</footer>
</div>

</body>
</html>
